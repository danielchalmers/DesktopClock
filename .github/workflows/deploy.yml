name: Release and deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the app'
        required: true
        default: ''
      dryRun:
        description: 'Build and package release artifacts without publishing a GitHub release'
        required: true
        type: boolean
        default: true
      updateRelease:
        description: 'Update existing release'
        required: true
        default: 'false'

permissions:
  contents: write

jobs:
  format:
    name: Format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/check-formatting

  build-test:
    name: Build and Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build-and-test

  package:
    name: Package ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/create-release-artifacts
        with:
          version: ${{ inputs.version }}
          arch: ${{ matrix.arch }}
          artifact-name: desktopclock-${{ matrix.arch }}

  deploy:
    name: Create GitHub release
    needs:
      - format
      - build-test
      - package
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: desktopclock-*
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        if: ${{ !inputs.dryRun }}
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ inputs.version }}"
          artifacts: "release-artifacts/*.zip,release-artifacts/*.msi"
          generateReleaseNotes: true
          prerelease: ${{ contains(inputs.version, 'preview') }}
          allowUpdates: ${{ inputs.updateRelease }}
          removeArtifacts: true
          omitBodyDuringUpdate: true
