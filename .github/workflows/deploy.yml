name: Release and deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the app'
        required: true
        default: '0.0.0'
      updateRelease:
        description: 'Update existing release'
        type: boolean
        required: true
        default: false
      dryRun:
        description: 'Dry run'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  format:
    name: Format
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/check-formatting

  build-test:
    name: Build and Test
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/build-and-test

  package:
    name: Package ${{ matrix.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/create-release-artifacts
        with:
          version: ${{ inputs.version }}
          arch: ${{ matrix.arch }}
          artifact-name: desktopclock-${{ matrix.arch }}

  deploy:
    name: Create GitHub release
    needs:
      - format
      - build-test
      - package
    runs-on: windows-2025
    env:
      RELEASE_TAG: v${{ inputs.version }}
    steps:
      - uses: actions/github-script@v8
        if: ${{ !inputs.dryRun && inputs.updateRelease }}
        env:
          RELEASE_TAG_REF: tags/${{ env.RELEASE_TAG }}
        with:
          script: |
            const ref = process.env.RELEASE_TAG_REF;

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`Tag ${ref} does not exist yet; skipping tag update.`);
                return;
              }

              throw error;
            }

            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              sha: context.sha,
              force: true,
            });

            core.info(`Updated ${ref} to ${context.sha}.`);

      - uses: actions/download-artifact@v8
        with:
          pattern: desktopclock-*
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        if: ${{ !inputs.dryRun }}
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ env.RELEASE_TAG }}
          commit: ${{ github.sha }}
          artifacts: "release-artifacts/*.zip,release-artifacts/*.msi"
          generateReleaseNotes: true
          prerelease: ${{ contains(inputs.version, 'preview') }}
          allowUpdates: ${{ inputs.updateRelease }}
          removeArtifacts: true
          omitBodyDuringUpdate: true
