name: Release and deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the app'
        required: true
        default: ''
      dryRun:
        description: 'Build and package release artifacts without publishing a GitHub release'
        required: true
        type: boolean
        default: true
      updateRelease:
        description: 'Update existing release'
        required: true
        default: 'false'

permissions:
  contents: write

jobs:
  build-test:
    name: Build and Test
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: ./.github/actions/build-and-test

  package:
    name: Package (${{ matrix.arch }})
    needs: build-test
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
    - uses: actions/checkout@v4

    - uses: ./.github/actions/create-release-artifacts
      with:
        version: ${{ inputs.version }}
        arch: ${{ matrix.arch }}
        artifact-name: desktopclock-${{ matrix.arch }}

  deploy:
    name: Create GitHub release
    needs: package
    runs-on: windows-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: desktopclock-*
        path: release-artifacts
        merge-multiple: true

    - name: Summarize release artifacts
      shell: pwsh
      run: |
        $dryRun = "${{ inputs.dryRun }}" -eq "true"
        $mode = if ($dryRun) { "Dry run" } else { "Release publish" }
        $artifacts = Get-ChildItem -Path "release-artifacts" -File | Sort-Object Name

        "## Release artifacts ($mode)" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        foreach ($artifact in $artifacts) {
          "- $($artifact.Name)" >> $env:GITHUB_STEP_SUMMARY
        }

    - name: Create GitHub release
      if: ${{ !inputs.dryRun }}
      uses: ncipollo/release-action@v1
      with:
        tag: "v${{ inputs.version }}"
        artifacts: "release-artifacts/*.zip,release-artifacts/*.msi"
        generateReleaseNotes: true
        prerelease: ${{ contains(inputs.version, 'preview') }}
        allowUpdates: ${{ inputs.updateRelease }}
        removeArtifacts: true
        omitBodyDuringUpdate: true
