name: Release and deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the app'
        required: true
        default: ''
      updateRelease:
        description: 'Update existing release'
        required: true
        default: 'false'

jobs:
  validate:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - uses: ./.github/actions/build-and-test

  publish:
    name: Publish (${{ matrix.arch }})
    needs: validate
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
    - uses: actions/checkout@v4

    - uses: ./.github/actions/create-release-artifacts
      with:
        version: ${{ github.event.inputs.version }}
        archs: ${{ matrix.arch }}
        artifact_name: desktopclock-${{ matrix.arch }}

  deploy:
    needs: publish
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: desktopclock-*
        path: publish
        merge-multiple: true

    - name: Create GitHub release
      uses: ncipollo/release-action@v1
      with:
        tag: "v${{ github.event.inputs.version }}"
        artifacts: "publish/*.zip,publish/*.msi"
        generateReleaseNotes: true
        prerelease: ${{ contains(github.event.inputs.version, 'preview') }}
        allowUpdates: ${{ github.event.inputs.updateRelease }}
        removeArtifacts: true
        omitBodyDuringUpdate: true
