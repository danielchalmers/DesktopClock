name: Publish

description: Creates release-ready binaries and uploads them as artifacts.

inputs:
  version:
    description: 'Version number for the app'
    default: '0.0.0'
  arch:
    description: 'Architecture for the build'
    default: 'x64'
  artifact-name:
    description: 'Name for the uploaded artifact bundle'
    default: 'desktopclock'

runs:
  using: "composite"
  steps:
    - uses: actions/setup-dotnet@v5

    - name: Create Binaries
      shell: bash
      run: |
        arch="${{ inputs.arch }}"
        dotnet tool install --global wix --version 4.0.6
        dotnet publish ./DesktopClock/DesktopClock.csproj -o "publish/$arch" -c Release --os win --arch "$arch" -p:Version=${{ inputs.version }}
        wix build Product.wxs -d MainExeSource="publish/$arch/DesktopClock.exe" -o "publish/DesktopClock-${{ inputs.version }}-$arch.msi"

    - name: Create Portable ZIP
      shell: pwsh
      run: |
        $arch = "${{ inputs.arch }}"
        Compress-Archive -Path "publish/$arch/DesktopClock.exe" -DestinationPath "publish/DesktopClock-${{ inputs.version }}-$arch.zip"

    - name: Smoke Check Artifacts
      shell: pwsh
      run: |
        $version = "${{ inputs.version }}"
        $arch = "${{ inputs.arch }}"
        $zipPath = "publish/DesktopClock-$version-$arch.zip"
        $msiPath = "publish/DesktopClock-$version-$arch.msi"
        $portableExePath = "publish/$arch/DesktopClock.exe"
        $minPortableExeBytes = 4096
        $minPortableZipBytes = 1024
        $minInstallerMsiBytes = 10240
        $artifacts = @(
          @{ Path = $portableExePath; MinimumBytes = $minPortableExeBytes; Label = "Portable executable" }
          @{ Path = $zipPath; MinimumBytes = $minPortableZipBytes; Label = "Portable ZIP" }
          @{ Path = $msiPath; MinimumBytes = $minInstallerMsiBytes; Label = "Installer MSI" }
        )

        foreach ($artifact in $artifacts) {
          if (-not (Test-Path $artifact.Path)) {
            throw "Expected artifact was not created: $($artifact.Path)"
          }

          $file = Get-Item $artifact.Path
          if ($file.Length -lt $artifact.MinimumBytes) {
            throw "$($artifact.Label) is unexpectedly small ($($file.Length) bytes): $($artifact.Path)"
          }
        }

        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zipPath))
        try {
          if (($zip.Entries | Where-Object { $_.FullName -eq 'DesktopClock.exe' }).Count -eq 0) {
            throw "Portable ZIP does not contain DesktopClock.exe: $zipPath"
          }
        }
        finally {
          $zip.Dispose()
        }

    - uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        if-no-files-found: error
        path: |
          publish/*.zip
          publish/*.msi
