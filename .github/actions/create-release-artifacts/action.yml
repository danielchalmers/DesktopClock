name: Publish

description: Creates release-ready binaries and uploads them as artifacts.

inputs:
  version:
    description: 'Version number for the app'
    default: '0.0.0'
  arch:
    description: 'Architecture for the build'
    default: 'x64'
  artifact_name:
    description: 'Artifact name for uploaded build outputs'
    default: 'desktopclock'

runs:
  using: "composite"
  steps:
    - uses: actions/setup-dotnet@v4

    - name: Create Binaries
      shell: bash
      run: |
        dotnet tool install --global wix --version 4.0.6
        dotnet publish ./DesktopClock/DesktopClock.csproj -o "publish/${{ inputs.arch }}" -c Release --os win --arch ${{ inputs.arch }} -p:Version=${{ inputs.version }}
        wix build Product.wxs -d MainExeSource="publish/${{ inputs.arch }}/DesktopClock.exe" -o "publish/DesktopClock-${{ inputs.version }}-${{ inputs.arch }}.msi"

    - name: Create Portable ZIPs
      shell: pwsh
      run: Compress-Archive -Path "publish/${{ inputs.arch }}/DesktopClock.exe" -DestinationPath "publish/DesktopClock-${{ inputs.version }}-${{ inputs.arch }}.zip"

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        if-no-files-found: error
        path: |
          publish/DesktopClock-${{ inputs.version }}-${{ inputs.arch }}.zip
          publish/DesktopClock-${{ inputs.version }}-${{ inputs.arch }}.msi
