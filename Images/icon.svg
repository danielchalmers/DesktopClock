<!-- Master source for DesktopClock.ico and icon.png. Small ICO sizes are re-rendered with proportionally thicker strokes for legibility. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E58D6" />
      <stop offset="1" stop-color="#8A46D9" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#tile)" />
  <circle cx="50" cy="50" r="27" fill="none" stroke="#FFFFFF" stroke-width="5" />
  <line x1="50" y1="50" x2="50" y2="34" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
  <line x1="50" y1="50" x2="62" y2="58" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
</svg>
